<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación - Conclusión</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .conclusion-scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 5vh;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 25px;
            padding: 8vh 6vw;
            max-width: 1100px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            animation: fadeIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .conclusion-title {
            font-family: 'Times New Roman', serif;
            font-size: 6vh;
            font-weight: bold;
            color: #1a3a5f;
            text-transform: uppercase;
            margin-bottom: 4vh;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .conclusion-title::before,
        .conclusion-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background-color: #D4AF37;
        }

        .conclusion-image-container {
            width: 100%;
            max-height: 45vh;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 5vh;
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .conclusion-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .final-phrase-container {
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 5vh;
            margin-top: 2vh;
        }

        .final-phrase {
            font-family: 'Times New Roman', serif;
            font-size: 4vh;
            font-style: italic;
            color: #1a3a5f;
            margin-bottom: 4vh;
            position: relative;
            display: inline-block;
        }

        .final-phrase::before,
        .final-phrase::after {
            content: '"';
            color: #D4AF37;
            font-size: 6vh;
            line-height: 0;
            vertical-align: bottom;
            font-family: Georgia, serif;
        }

        .final-phrase::before {
            margin-right: 8px;
        }

        .final-phrase::after {
            margin-left: 8px;
        }

        .thanks-text {
            font-family: 'Times New Roman', serif;
            font-size: 5vh;
            font-weight: bold;
            color: #D4AF37;
            margin-bottom: 1vh;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .thanks-padre {
            font-family: 'Times New Roman', serif;
            font-size: 2.8vh;
            color: #777;
            text-align: right;
            margin-top: 2vh;
            font-style: italic;
            display: block;
        }
    </style>
</head>

<body class="animated-bg">
    <div class="slide" style="padding:0; max-width:100vw;">
        <div class="conclusion-scene">
            <div class="glass-card">

                <div class="conclusion-image-container">
                    <img src="images/828282.jpg" alt="Conclusión" class="conclusion-photo">
                </div>

                <div class="final-phrase-container">
                    <div class="final-phrase">
                        Sigamos abriendo nuevos caminos y horizontes en la investigación estudiantil
                    </div>
                    <div class="thanks-text">¡Muchas Gracias!</div>
                    <span class="thanks-padre">¡Gracias Padre!</span>
                </div>
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
</body>

</html>
